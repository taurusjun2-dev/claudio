<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Claudio FM</title>
  <link rel="manifest" href="/manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --dot: rgba(255,255,255,0.04);
      --card: #131324;
      --card2: #1a1a2e;
      --border: rgba(255,255,255,0.07);
      --text: #e0e0f0;
      --text2: #666;
      --text3: #999;
      --green: #00c875;
      --accent: #c8a96e;
      --user-bg: #1e1e35;
    }

    [data-theme="light"] {
      --bg: #eaeaf2;
      --dot: rgba(80,80,140,0.12);
      --card: #fff;
      --card2: #f5f5fa;
      --border: rgba(0,0,0,0.07);
      --text: #1a1a2e;
      --text2: #aaa;
      --text3: #888;
      --green: #00a860;
      --accent: #7c6a4a;
      --user-bg: #1a1a2e;
    }

    html, body {
      height: 100%;
      background-color: var(--bg);
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
      background-size: 22px 22px;
      color: var(--text);
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'VT323', monospace;
      font-size: 16px; color: white;
      flex-shrink: 0;
      overflow: hidden;
    }

    .logo-name {
      font-family: 'VT323', 'Courier New', monospace;
      font-size: 22px;
      letter-spacing: 3px;
      color: var(--text);
    }

    .header-btns {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hbtn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text3);
      cursor: pointer;
      transition: all .15s;
    }

    .hbtn:hover { color: var(--text); border-color: var(--text3); }
    .hbtn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* ── Clock ── */
    .clock-section {
      text-align: center;
      padding: 6px 20px 12px;
      flex-shrink: 0;
    }

    .clock {
      font-family: 'VT323', 'Courier New', monospace;
      font-size: 72px;
      line-height: 1;
      letter-spacing: 6px;
      color: var(--text);
    }

    .clock-date {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text2);
      margin-top: 2px;
      text-transform: uppercase;
    }

    .on-air-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 6px;
    }

    .on-air-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1.2s ease-in-out infinite;
    }

    .on-air-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--green);
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── Player card ── */
    .player-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin: 0 16px 10px;
      padding: 14px 16px;
      flex-shrink: 0;
    }

    .np-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .np-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 16px;
      flex-shrink: 0;
    }

    .np-bar {
      width: 2.5px;
      background: var(--green);
      border-radius: 1px;
      animation: barAnim .7s ease-in-out infinite alternate;
    }

    .np-bar:nth-child(1) { height: 7px; animation-delay: 0s; }
    .np-bar:nth-child(2) { height: 13px; animation-delay: .12s; }
    .np-bar:nth-child(3) { height: 9px; animation-delay: .25s; }
    .np-bar:nth-child(4) { height: 16px; animation-delay: .37s; }
    .np-bar:nth-child(5) { height: 11px; animation-delay: .08s; }
    .np-bars.paused .np-bar { animation-play-state: paused; height: 3px !important; }

    @keyframes barAnim { from{transform:scaleY(.25)} to{transform:scaleY(1)} }

    .np-info { flex: 1; min-width: 0; }
    #song-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #song-artist { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .np-playing { font-size: 10px; letter-spacing: 2px; color: var(--green); }

    /* Controls */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .ctrl {
      background: none; border: none;
      color: var(--text3);
      font-size: 14px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      transition: color .15s;
      line-height: 1;
    }

    .ctrl:hover { color: var(--text); }
    .ctrl.active { color: var(--green); }
    #btn-play { font-size: 18px; color: var(--text); }

    .ctrl-sep { width: 1px; height: 14px; background: var(--border); margin: 0 4px; flex-shrink: 0; }

    .ctrl-label {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text3);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      transition: color .15s;
    }

    .ctrl-label:hover { color: var(--text); }

    .vol-wrap {
      display: flex; align-items: center; gap: 5px;
      margin-left: auto;
      font-size: 10px; letter-spacing: 1px; color: var(--text3);
    }

    .vol-slider {
      width: 60px; height: 3px;
      -webkit-appearance: none; appearance: none;
      background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      background: var(--text3); border-radius: 50%;
    }

    /* Progress */
    .progress-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text2);
      font-variant-numeric: tabular-nums;
    }

    #progress-bar {
      flex: 1; height: 2px;
      background: var(--border);
      border-radius: 1px;
      cursor: pointer;
    }

    #progress-fill {
      height: 100%;
      background: var(--text);
      border-radius: 1px;
      width: 0%;
      transition: width .5s linear;
    }

    /* ── Queue ── */
    .queue-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin: 0 16px 10px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .queue-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text2);
      cursor: pointer;
      user-select: none;
    }

    .queue-header:hover { color: var(--text3); }

    .queue-list { border-top: 1px solid var(--border); }

    .queue-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      cursor: pointer;
      transition: background .15s;
    }

    .queue-item:last-child { border-bottom: none; }
    .queue-item:hover { background: var(--card2); }

    .queue-item.active {
      background: rgba(0,200,117,0.08);
    }

    .q-icon { color: var(--text2); font-size: 10px; width: 14px; flex-shrink: 0; }
    .queue-item.active .q-icon { color: var(--green); }
    .q-title { font-weight: 500; flex: 1; }
    .q-artist { font-size: 11px; color: var(--text2); }
    .queue-empty { padding: 10px 14px; font-size: 11px; color: var(--text2); }

    /* ── Chat section ── */
    .chat-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin: 0 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-live {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; font-weight: 600; letter-spacing: 1px;
    }

    .chat-live-dot {
      width: 7px; height: 7px;
      background: var(--green); border-radius: 50%;
      animation: blink 1.2s infinite;
    }

    .live-tag {
      font-size: 9px; letter-spacing: 2px;
      border: 1px solid var(--green);
      color: var(--green);
      padding: 2px 6px; border-radius: 3px;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .system-msg {
      text-align: center;
      font-size: 11px;
      color: var(--text2);
      font-style: italic;
      letter-spacing: 0.5px;
    }

    /* DJ message */
    .dj-msg {
      display: flex; gap: 10px; align-items: flex-start;
    }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; align-items: center; justify-content: center;
      font-family: 'VT323', monospace; font-size: 14px; color: white;
      margin-top: 2px;
    }

    .dj-msg-body { flex: 1; min-width: 0; }

    .dj-msg-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text2);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .dj-msg-text {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text);
      word-break: break-word;
      overflow-wrap: break-word;
    }

    .dj-msg-text mark {
      background: rgba(0,200,117,0.18);
      color: #00c875;
      border-radius: 2px;
      padding: 0 1px;
    }

    .dj-msg-meta {
      display: flex; align-items: center; gap: 8px;
      margin-top: 5px;
    }

    .dj-msg-time {
      font-size: 10px;
      color: var(--text2);
      font-variant-numeric: tabular-nums;
    }

    .replay-btn {
      display: flex; align-items: center; gap: 3px;
      font-size: 10px;
      color: var(--text2);
      cursor: pointer;
      background: none; border: none;
      padding: 0;
      letter-spacing: 0.5px;
    }

    .replay-btn:hover { color: var(--text3); }

    /* User message */
    .user-msg {
      display: flex; gap: 10px; align-items: flex-start;
      justify-content: flex-end;
    }

    .user-msg-body { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 60px; max-width: calc(100% - 46px); }

    .user-label {
      font-size: 10px; letter-spacing: 1px;
      color: var(--text2); font-weight: 600;
    }

    .user-bubble {
      background: var(--user-bg);
      color: var(--text);
      padding: 9px 14px;
      border-radius: 14px 14px 3px 14px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 100%;
      word-break: break-word;
    }

    [data-theme="light"] .user-bubble { color: #fff; }

    .user-msg-time { font-size: 10px; color: var(--text2); }

    .user-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--bg);
      margin-top: 18px;
    }

    .chat-msg.loading {
      font-size: 12px; color: var(--text2);
      font-style: italic;
      animation: pulse 1.4s ease-in-out infinite;
      padding-left: 40px;
    }

    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

    /* Input */
    .chat-input-wrap {
      display: flex; gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 9px 16px;
      font-size: 13px;
      color: var(--text);
      outline: none;
    }

    #chat-input:focus { border-color: var(--text3); }
    #chat-input::placeholder { color: var(--text2); }

    .chat-send-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--text);
      border: none;
      color: var(--bg);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── Footer ── */
    footer {
      display: flex;
      justify-content: space-between;
      padding: 8px 20px 12px;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text2);
      flex-shrink: 0;
    }

    #conn-text { color: var(--green); }

    /* ── Settings modal ── */
    .settings-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      align-items: flex-end;
    }

    .settings-overlay.open { display: flex; }

    .settings-sheet {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      display: flex; flex-direction: column; gap: 14px;
      max-height: 85vh; overflow-y: auto;
      position: relative;
    }

    .settings-sheet h2 { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
    .settings-close {
      position: absolute; top: 16px; right: 20px;
      background: none; border: none;
      color: var(--text2); font-size: 22px; cursor: pointer;
    }

    .sf { display: flex; flex-direction: column; gap: 5px; }
    .sf label { font-size: 10px; letter-spacing: 1px; color: var(--text2); text-transform: uppercase; }
    .sf input {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      color: var(--text); font-size: 14px; outline: none;
    }
    .sf input:focus { border-color: var(--text3); }
    .field-hint { font-size: 11px; color: var(--text2); }
    .key-row { display: flex; gap: 6px; }
    .key-row input { flex: 1; }
    .btn-eye {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
      cursor: pointer; font-size: 14px; color: var(--text2);
    }
    .btn-primary {
      background: var(--text); border: none; border-radius: 10px;
      padding: 13px; color: var(--bg); font-size: 14px; font-weight: 600;
      cursor: pointer;
    }
    .btn-secondary {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px;
      color: var(--text3); font-size: 13px; cursor: pointer;
    }
    #settings-status { font-size: 12px; text-align: center; min-height: 18px; }

    /* ── Mobile waveform card (responsive) ── */
    @media (max-width: 480px) {
      .clock { font-size: 52px; }
      #chat-input { font-size: 13px; }
    }


    /* ── Now Playing overlay ── */
    .np-overlay {
      display: none;
      position: fixed; inset: 0;
      z-index: 50;
      flex-direction: column;
      background: #0a0a18;
      max-width: 680px;
      margin: 0 auto;
    }

    .np-overlay.open { display: flex; }

    .np-top {
      position: relative;
      flex-shrink: 0;
      height: 200px;
      overflow: hidden;
      padding: 18px 20px 0;
    }

    .np-top-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }

    .np-logo {
      display: flex; align-items: center; gap: 8px;
    }

    .np-logo-av {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; align-items: center; justify-content: center;
      font-family: 'VT323', monospace; font-size: 15px; color: white;
    }

    .np-logo-name {
      font-family: 'VT323', monospace;
      font-size: 20px; letter-spacing: 2px;
      color: rgba(255,255,255,0.9);
    }

    .np-elapsed {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      font-variant-numeric: tabular-nums;
    }

    .np-speaking {
      display: none;
      align-items: center; gap: 6px;
      margin-top: 6px;
      position: relative; z-index: 2;
    }

    .np-speaking.active { display: flex; }

    .np-speaking-dot {
      width: 6px; height: 6px;
      border-radius: 50%; background: #00c875;
      animation: blink 1.2s infinite;
    }

    .np-speaking-label { font-size: 12px; color: #00c875; }

    #np-wf-canvas {
      position: absolute;
      bottom: 0; left: 0; width: 100%;
      pointer-events: none;
    }

    /* White card */
    .np-card {
      background: #fff;
      border-radius: 20px 20px 0 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 -6px 30px rgba(0,0,0,.4);
    }

    .np-card-inner {
      flex: 1;
      overflow: hidden;
      padding: 22px 22px 0;
      display: flex;
      flex-direction: column;
    }

    #np-session-title {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.15;
      color: #1a1a2e;
      margin-bottom: 3px;
    }

    #np-song-info {
      font-size: 13px;
      color: #999;
      margin-bottom: 14px;
    }

    .np-progress-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
    }

    #np-btn-play {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #1a1a2e; border: none;
      color: white; font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    #np-progress-bar {
      flex: 1; height: 2px;
      background: #eee; border-radius: 1px;
      cursor: pointer;
    }

    #np-progress-fill {
      height: 100%; background: #1a1a2e;
      border-radius: 1px; width: 0%;
      transition: width .5s linear;
    }

    #np-time { font-size: 12px; color: #999; white-space: nowrap; }

    /* Sentences */
    #np-sentences {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 8px;
    }

    .np-sentence {
      display: flex;
      flex-direction: column;
      gap: 2px;
      transition: opacity .4s;
    }

    .np-sentence.past { opacity: 0.35; }
    .np-sentence.current { opacity: 1; }
    .np-sentence.future { opacity: 0.18; }

    .np-sentence-meta {
      font-size: 11px; color: #bbb;
    }

    .np-sentence-text {
      font-size: 15px; line-height: 1.65; color: #1a1a2e;
    }

    .np-sentence-text mark {
      background: rgba(0,200,117,.2);
      color: #00a060;
      border-radius: 2px; padding: 0 1px;
    }

    /* Bottom bar */
    .np-bottom {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 22px 16px;
      background: #fff;
      flex-shrink: 0;
    }

    .np-bb-time {
      font-size: 12px; color: #999;
      font-variant-numeric: tabular-nums;
      width: 30px;
    }

    .np-bb-viz {
      flex: 1; height: 24px;
      display: flex; align-items: center; gap: 1.5px;
    }

    .np-bb-bar {
      flex: 1; background: #ddd; border-radius: 1px;
      transition: background .1s;
    }

    .np-bb-bar.on { background: #1a1a2e; }

    #np-btn-play-bottom {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: #1a1a2e; border: none;
      color: white; font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* Back button */
    .np-back {
      position: absolute; top: 18px; right: 60px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px; letter-spacing: 1px;
      color: rgba(255,255,255,.7);
      cursor: pointer; z-index: 3;
    }

    .np-back:hover { color: white; }

    audio { display: none; }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-avatar" id="logo-avatar">C</div>
      <span class="logo-name">Claudio FM</span>
    </div>
    <div class="header-btns">
      
      <button class="hbtn" id="btn-dark-t" onclick="setTheme('dark')">DARK</button>
      <button class="hbtn active" id="btn-light-t" onclick="setTheme('light')">LIGHT</button>
    </div>
  </header>

  <div class="clock-section">
    <div class="clock" id="clock">00:00</div>
    <div class="clock-date" id="clock-date">—</div>
    <div class="on-air-row">
      <span class="on-air-dot"></span>
      <span class="on-air-label" id="on-air-label">ON AIR</span>
    </div>
  </div>

  <!-- Player card -->
  <div class="player-card">
    <div class="np-row">
      <div class="np-bars paused" id="np-bars">
        <div class="np-bar"></div>
        <div class="np-bar"></div>
        <div class="np-bar"></div>
        <div class="np-bar"></div>
        <div class="np-bar"></div>
      </div>
      <div class="np-info">
        <div id="song-title">—</div>
        <div id="song-artist">Claudio FM</div>
      </div>
      <span class="np-playing" id="np-status">· IDLE</span>
    </div>

    <div class="controls-row">
      <button class="ctrl" onclick="sendCommand('prev')" title="上一首">&#9664;&#9664;</button>
      <button class="ctrl" id="btn-play" onclick="togglePlay()">&#9654;</button>
      <button class="ctrl" onclick="sendCommand('next')" title="下一首">&#9654;&#9654;</button>
      <button class="ctrl" onclick="audioMusic.pause(); setPlayState(false)" title="停止">&#9646;&#9646;</button>
      <button class="ctrl" id="btn-fav" onclick="toggleFav()">&#9825;</button>
      <div class="ctrl-sep"></div>
      <span class="ctrl-label" onclick="toggleQueueList()">HIDE</span>
      <span class="ctrl-label">FAV</span>
      <div class="vol-wrap">
        VOL
        <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="80" oninput="setVolume(this.value)">
      </div>
    </div>

    <div class="progress-row">
      <span id="t-cur">0:00</span>
      <div id="progress-bar" onclick="seek(event)">
        <div id="progress-fill"></div>
      </div>
      <span id="t-dur">0:00</span>
    </div>
  </div>

  <!-- Queue -->
  <div class="queue-section">
    <div class="queue-header" onclick="toggleQueueList()">
      <span>QUEUE</span>
      <span id="queue-count">0 TRACKS</span>
    </div>
    <div class="queue-list" id="queue-list" style="display:none">
      <div class="queue-empty">队列为空</div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-section">
    <div class="chat-header">
      <div class="chat-live">
        <span class="chat-live-dot"></span>
        Claudio
      </div>
      <span class="live-tag">LIVE</span>
    </div>

    <div id="chat-messages">
      <div class="system-msg">Connected to Claudio server</div>
    </div>

    <div class="chat-input-wrap">
      <input id="chat-input" placeholder="Say something to the DJ..." />
      <button class="chat-send-btn" onclick="sendChat()">&#8593;</button>
    </div>
  </div>

  <footer>
    <span>CLAUDIO FM</span>
    <span id="conn-text">CONNECTED</span>
  </footer>

</div>

<!-- Now Playing overlay -->
<div class="np-overlay" id="np-overlay">
  <div class="np-top">
    <div class="np-top-header">
      <div class="np-logo" onclick="closeNowPlaying()" style="cursor:pointer">
        <div class="np-logo-av">C</div>
        <span class="np-logo-name">Claudio FM</span>
      </div>
      <span class="np-elapsed" id="np-elapsed">0:00</span>
    </div>
    <div class="np-speaking" id="np-speaking">
      <span class="np-speaking-dot"></span>
      <span class="np-speaking-label">Speaking...</span>
    </div>
    <canvas id="np-wf-canvas"></canvas>
    
  </div>

  <div class="np-card">
    <div class="np-card-inner">
      <div id="np-session-title">—</div>
      <div id="np-song-info">—</div>

      <div class="np-progress-row">
        <button id="np-btn-play" onclick="togglePlay()">&#9654;</button>
        <div id="np-progress-bar" onclick="npSeek(event)">
          <div id="np-progress-fill"></div>
        </div>
        <span id="np-time">0:00 / 0:00</span>
      </div>

      <div id="np-sentences"></div>
    </div>

    <div class="np-bottom">
      <span class="np-bb-time" id="np-cur">0:00</span>
      <div class="np-bb-viz" id="np-bb-viz"></div>
      <button id="np-btn-play-bottom" onclick="togglePlay()">&#9654;</button>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="settings-overlay" id="settings-overlay" onclick="closeSettingsOutside(event)">
  <div class="settings-sheet">
    <button class="settings-close" onclick="closeSettings()">&#10005;</button>
    <h2>设置</h2>
    <div class="sf">
      <label>API 地址</label>
      <input type="url" id="setting-url" placeholder="https://api.deepseek.com/v1" />
    </div>
    <div class="sf">
      <label>模型名称</label>
      <input type="text" id="setting-model" placeholder="deepseek-chat" />
    </div>
    <div class="sf">
      <label>API Key</label>
      <div class="key-row">
        <input type="password" id="setting-apikey" placeholder="输入 API Key" />
        <button class="btn-eye" onclick="toggleKeyVisibility()">&#128065;</button>
      </div>
      <span class="field-hint">保存后不再显示完整 Key</span>
    </div>
    <div class="sf">
      <label>最大 Tokens</label>
      <input type="number" id="setting-maxtokens" value="4000" />
    </div>
    <div class="sf">
      <label>天气城市 (英文)</label>
      <input type="text" id="setting-weather" placeholder="Shanghai" />
    </div>
    <button class="btn-primary" onclick="saveSettings()">保存设置</button>
    <button class="btn-secondary" onclick="testLLM()">测试连接</button>
    <div id="settings-status"></div>
  </div>
</div>

<audio id="audio-tts"></audio>
<audio id="audio-music"></audio>
<script src="/app.js"></script>
</body>
</html>
