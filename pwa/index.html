<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claudio</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ebebf2;
      --dot: rgba(90,90,140,0.18);
      --card: #fff;
      --border: rgba(0,0,0,0.08);
      --text: #1a1a2e;
      --text2: #888;
      --accent: #1a1a2e;
      --on-air: #00c875;
      --input-bg: #f4f4f8;
      --user-bubble: #1a1a2e;
      --user-text: #fff;
    }
    [data-theme="dark"] {
      --bg: #0f0f1a;
      --dot: rgba(255,255,255,0.05);
      --card: #1a1a2a;
      --border: rgba(255,255,255,0.08);
      --text: #e8e8f0;
      --text2: #666;
      --accent: #c8a96e;
      --on-air: #00c875;
      --input-bg: #141420;
      --user-bubble: #c8a96e;
      --user-text: #0f0f1a;
    }

    body {
      background-color: var(--bg);
      background-image: radial-gradient(circle, var(--dot) 1.2px, transparent 1.2px);
      background-size: 22px 22px;
      color: var(--text);
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-avatar {
      width: 32px; height: 32px;
      background: var(--accent);
      color: var(--bg);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }
    .logo-name {
      font-family: 'VT323', 'Courier New', monospace;
      font-size: 22px;
      letter-spacing: 3px;
      color: var(--accent);
    }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .theme-btns {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }
    .theme-btns button {
      background: none;
      border: none;
      padding: 4px 12px;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
    }
    .theme-btns button.active {
      background: var(--accent);
      color: var(--bg);
    }
    .btn-settings {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 30px; height: 30px;
      color: var(--text2);
      font-size: 14px;
      cursor: pointer;
      position: relative;
    }
    .btn-settings:hover { color: var(--text); }
    .settings-dot {
      position: absolute; top: 2px; right: 2px;
      width: 7px; height: 7px;
      background: #e55; border-radius: 50%;
      display: none;
    }
    .settings-dot.show { display: block; }

    /* ── Clock ── */
    .clock-section {
      text-align: center;
      padding: 12px 20px 16px;
    }
    .clock {
      font-family: 'VT323', 'Courier New', monospace;
      font-size: 88px;
      line-height: 1;
      color: var(--text);
      letter-spacing: 4px;
    }
    .clock-date {
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--text2);
      margin-top: 2px;
      text-transform: uppercase;
    }
    .on-air {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--on-air);
    }
    .on-air-dot {
      width: 7px; height: 7px;
      background: var(--on-air);
      border-radius: 50%;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Player ── */
    .player-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin: 0 16px;
      padding: 18px 20px;
    }
    .np-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .np-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 18px;
      flex-shrink: 0;
    }
    .np-bar {
      width: 3px;
      background: var(--on-air);
      border-radius: 1px;
      animation: barAnim 0.8s ease-in-out infinite alternate;
    }
    .np-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
    .np-bar:nth-child(2) { height: 14px; animation-delay: .15s; }
    .np-bar:nth-child(3) { height: 10px; animation-delay: .3s; }
    .np-bar:nth-child(4) { height: 18px; animation-delay: .45s; }
    .np-bar:nth-child(5) { height: 12px; animation-delay: .1s; }
    .np-bars.paused .np-bar { animation-play-state: paused; }
    @keyframes barAnim { from{transform:scaleY(.3)} to{transform:scaleY(1)} }
    .np-info { flex: 1; min-width: 0; }
    #song-title {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #song-artist { font-size: 12px; color: var(--text2); margin-top: 1px; }
    .np-status { font-size: 10px; letter-spacing: 2px; color: var(--on-air); }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      transition: all .15s;
      line-height: 1;
    }
    .ctrl-btn:hover { color: var(--accent); }
    #btn-play { font-size: 24px !important; }
    .ctrl-divider { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }
    .vol-wrap {
      display: flex; align-items: center; gap: 6px;
      margin-left: auto;
      font-size: 10px; letter-spacing: 1px; color: var(--text2);
    }
    .vol-slider {
      width: 72px; height: 3px;
      -webkit-appearance: none; appearance: none;
      background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
    }
    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      background: var(--accent); border-radius: 50%;
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text2);
    }
    #progress-bar {
      flex: 1; height: 3px;
      background: var(--input-bg);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }
    #progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width .5s linear;
    }

    /* ── Queue ── */
    .queue-section {
      margin: 12px 16px 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .queue-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text2);
      user-select: none;
    }
    .queue-header:hover { color: var(--text); }
    .queue-items { border-top: 1px solid var(--border); }
    .queue-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .queue-item:last-child { border-bottom: none; }
    .q-num { color: var(--text2); font-size: 11px; width: 14px; text-align: right; }
    .q-title { font-weight: 500; }
    .q-artist { font-size: 11px; color: var(--text2); }
    .queue-empty-msg { padding: 14px 16px; font-size: 12px; color: var(--text2); text-align: center; }

    /* ── Chat ── */
    .chat-section {
      margin: 12px 16px 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 320px;
    }
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .chat-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; letter-spacing: 1px; font-weight: 600;
    }
    .chat-live-dot {
      width: 7px; height: 7px;
      background: var(--on-air); border-radius: 50%;
      animation: blink 1.4s infinite;
    }
    .live-badge {
      font-size: 10px; letter-spacing: 2px;
      color: var(--on-air); border: 1px solid var(--on-air);
      padding: 2px 6px; border-radius: 4px;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .system-msg {
      text-align: center;
      font-size: 11px;
      color: var(--text2);
      letter-spacing: 1px;
    }
    .dj-msg { display: flex; flex-direction: column; gap: 2px; }
    .dj-msg-label { font-size: 10px; letter-spacing: 2px; color: var(--text2); font-weight: 600; }
    .dj-msg-text { font-size: 14px; line-height: 1.6; color: var(--text); }
    .dj-msg-time { font-size: 10px; color: var(--text2); margin-top: 2px; }
    .user-msg {
      display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
    }
    .user-msg-bubble {
      background: var(--user-bubble);
      color: var(--user-text);
      padding: 8px 14px;
      border-radius: 18px 18px 4px 18px;
      font-size: 14px;
      max-width: 80%;
    }
    .chat-msg.loading {
      font-size: 13px;
      color: var(--text2);
      font-style: italic;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

    .chat-input-wrap {
      display: flex; gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
    }
    #chat-input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 9px 16px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    #chat-input:focus { border-color: var(--accent); }
    #chat-input::placeholder { color: var(--text2); }
    #chat-send {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 38px; height: 38px;
      color: var(--bg);
      font-size: 16px;
      cursor: pointer;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    #chat-send:hover { opacity: .8; }

    /* ── Footer ── */
    footer {
      display: flex;
      justify-content: space-between;
      padding: 12px 20px 20px;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text2);
    }
    #conn-status { color: var(--on-air); }

    /* ── Settings Modal ── */
    .settings-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 100;
      align-items: flex-end;
    }
    .settings-overlay.open { display: flex; }
    .settings-sheet {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      display: flex; flex-direction: column; gap: 16px;
    }
    .settings-sheet h2 { font-size: 16px; font-weight: 600; }
    .settings-close {
      position: absolute; top: 16px; right: 20px;
      background: none; border: none;
      color: var(--text2); font-size: 20px; cursor: pointer;
    }
    .sf { display: flex; flex-direction: column; gap: 5px; }
    .sf label { font-size: 11px; letter-spacing: 1px; color: var(--text2); }
    .sf input {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text); font-size: 14px; outline: none;
    }
    .sf input:focus { border-color: var(--accent); }
    .field-hint { font-size: 11px; color: var(--text2); }
    .key-row { display: flex; gap: 6px; }
    .key-row input { flex: 1; }
    .btn-eye {
      background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px; cursor: pointer;
      font-size: 14px; color: var(--text2); min-width: 40px;
    }
    .btn-primary {
      background: var(--accent); border: none;
      border-radius: 8px; padding: 12px;
      color: var(--bg); font-size: 14px; font-weight: 500;
      cursor: pointer; width: 100%;
    }
    .btn-primary:hover { opacity: .85; }
    .btn-secondary {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 10px;
      color: var(--text2); font-size: 13px;
      cursor: pointer; width: 100%;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--text); }
    #settings-status { font-size: 12px; text-align: center; color: var(--accent); min-height: 18px; }

    audio { display: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-avatar">C</div>
    <span class="logo-name">Claudio</span>
  </div>
  <div class="header-right">
    <div class="theme-btns">
      <button id="btn-dark" onclick="setTheme('dark')">DARK</button>
      <button id="btn-light" onclick="setTheme('light')" class="active">LIGHT</button>
    </div>
    <button class="btn-settings" onclick="openSettings()">
      &#9881;
      <span class="settings-dot" id="settings-dot"></span>
    </button>
  </div>
</header>

<div class="clock-section">
  <div class="clock" id="clock">00:00</div>
  <div class="clock-date" id="clock-date">—</div>
  <div class="on-air">
    <span class="on-air-dot" id="on-air-dot"></span>
    <span id="on-air-text">CONNECTING</span>
  </div>
</div>

<div class="player-card">
  <div class="np-row">
    <div class="np-bars paused" id="np-bars">
      <div class="np-bar"></div>
      <div class="np-bar"></div>
      <div class="np-bar"></div>
      <div class="np-bar"></div>
      <div class="np-bar"></div>
    </div>
    <div class="np-info">
      <div id="song-title">—</div>
      <div id="song-artist">Claudio FM</div>
    </div>
    <span class="np-status" id="np-status">· IDLE</span>
  </div>

  <div class="player-controls">
    <button class="ctrl-btn" onclick="sendCommand('skip')" title="上一首">&#9664;&#9664;</button>
    <button class="ctrl-btn" id="btn-play" onclick="togglePlay()">&#9654;</button>
    <button class="ctrl-btn" onclick="sendCommand('next')" title="下一首">&#9654;&#9654;</button>
    <div class="ctrl-divider"></div>
    <button class="ctrl-btn" id="btn-fav" onclick="toggleFav()" title="收藏">&#9825;</button>
    <div class="vol-wrap">
      VOL
      <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="80" oninput="setVolume(this.value)">
    </div>
  </div>

  <div class="progress-row">
    <span id="t-cur">0:00</span>
    <div id="progress-bar" onclick="seek(event)">
      <div id="progress-fill"></div>
    </div>
    <span id="t-dur">0:00</span>
  </div>
</div>

<div class="queue-section">
  <div class="queue-header" onclick="toggleQueue()">
    <span>QUEUE</span>
    <span id="queue-count">0 TRACKS &#9660;</span>
  </div>
  <div class="queue-items" id="queue-items" style="display:none">
    <div class="queue-empty-msg">队列为空</div>
  </div>
</div>

<div class="chat-section">
  <div class="chat-header">
    <div class="chat-title">
      <span class="chat-live-dot"></span>
      CLAUDIO
    </div>
    <span class="live-badge">LIVE</span>
  </div>
  <div id="chat-messages">
    <div class="system-msg">Connected to Claudio server</div>
  </div>
  <div class="chat-input-wrap">
    <input id="chat-input" placeholder="Say something to the DJ..." />
    <button id="chat-send" onclick="sendChat()">&#8593;</button>
  </div>
</div>

<footer>
  <span>CLAUDIO FM</span>
  <span id="conn-status">CONNECTING</span>
</footer>

<!-- Settings Sheet -->
<div class="settings-overlay" id="settings-overlay" onclick="closeSettingsOutside(event)">
  <div class="settings-sheet">
    <button class="settings-close" onclick="closeSettings()">&#10005;</button>
    <h2>设置</h2>
    <div class="sf">
      <label>API 地址</label>
      <input type="url" id="setting-url" placeholder="https://api.deepseek.com/v1" />
    </div>
    <div class="sf">
      <label>模型名称</label>
      <input type="text" id="setting-model" placeholder="deepseek-chat" />
    </div>
    <div class="sf">
      <label>API Key</label>
      <div class="key-row">
        <input type="password" id="setting-apikey" placeholder="输入 API Key" />
        <button class="btn-eye" onclick="toggleKeyVisibility()" id="btn-reveal-key">&#128065;</button>
      </div>
      <span class="field-hint">保存后不再显示完整 Key</span>
    </div>
    <div class="sf">
      <label>最大 Tokens</label>
      <input type="number" id="setting-maxtokens" value="4000" min="1000" max="32000" />
    </div>
    <div class="sf">
      <label>天气城市 (英文)</label>
      <input type="text" id="setting-weather" placeholder="Shanghai" />
    </div>
    <button class="btn-primary" onclick="saveSettings()">保存设置</button>
    <button class="btn-secondary" onclick="testLLM()">测试连接</button>
    <div id="settings-status"></div>
  </div>
</div>

<audio id="audio-tts"></audio>
<audio id="audio-music"></audio>
<script src="/app.js"></script>
</body>
</html>
